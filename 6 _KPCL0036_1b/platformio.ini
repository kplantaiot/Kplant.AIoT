[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.19.4
    bogde/HX711 @ ^0.7.5
    adafruit/DHT sensor library @ ^1.4.2
    adafruit/Adafruit Unified Sensor @ ^1.1.4
monitor_speed = 115200
board_build.filesystem = littlefs

; === OTA (Over-The-Air) ===
; Mismo firmware, pero sube por WiFi en vez de USB
; Cambiar upload_port a la IP del dispositivo destino
[env:ota]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.19.4
    bogde/HX711 @ ^0.7.5
    adafruit/DHT sensor library @ ^1.4.2
    adafruit/Adafruit Unified Sensor @ ^1.1.4
monitor_speed = 115200
board_build.filesystem = littlefs
upload_protocol = espota
upload_port = 192.168.1.91